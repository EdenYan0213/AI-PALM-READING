<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本周手相记录</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <style>
    body {
      background:
        radial-gradient(circle at 8% 5%, rgba(255, 228, 236, 0.6), transparent 35%),
        radial-gradient(circle at 95% 92%, rgba(209, 233, 255, 0.45), transparent 42%),
        #fff8f7;
    }

    .glass {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.78);
    }
  </style>
</head>

<body class="text-slate-800 min-h-screen pb-20">
  <main class="max-w-2xl mx-auto px-5 py-6 space-y-5">
    <header class="glass rounded-3xl p-5">
      <p class="text-xs text-pink-600">Weekly Palm Diary</p>
      <h1 class="mt-1 text-2xl font-semibold text-pink-700">记录你本周的掌中气色</h1>
      <p class="mt-2 text-sm text-slate-600">快速记录：跳过描线，AI将基于本周照片生成简洁版波动报告。</p>
    </header>

    <section class="glass rounded-3xl p-5 space-y-4">
      <div class="flex items-center justify-between">
        <label class="text-sm text-slate-600" for="recordDateInput">记录日期（可补记近7天）</label>
        <a href="../palm_calendar/code.html" class="text-xs text-pink-600 underline">查看手相日历</a>
      </div>
      <input id="recordDateInput" type="date" class="w-full rounded-xl border-pink-200" />

      <input id="photoInput" type="file" accept="image/*" class="hidden" />
      <button id="pickPhotoButton" class="w-full py-3 rounded-full bg-pink-100 text-pink-700 font-semibold">上传本周手掌照片</button>

      <div id="previewWrap" class="hidden rounded-2xl border border-pink-100 overflow-hidden">
        <img id="previewImage" class="w-full h-52 object-cover" alt="Palm preview" />
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <button id="submitButton" class="py-3 rounded-full bg-pink-600 text-white font-semibold">生成本周波动报告</button>
        <a href="../trace_confirm/code.html?recordFlow=weekly" class="py-3 rounded-full border border-pink-200 text-center text-pink-700 font-semibold">详细描绘模式</a>
      </div>
      <p id="statusText" class="text-xs text-slate-500"></p>
    </section>

    <section id="resultCard" class="glass rounded-3xl p-5 hidden">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold text-pink-700">本周手相波动报告</h2>
        <span id="runeTag" class="text-xs px-2 py-1 rounded-full bg-blue-100 text-blue-700">符文</span>
      </div>
      <p id="compareHint" class="mt-2 text-sm text-slate-600"></p>
      <p id="summaryText" class="mt-3 text-sm leading-6"></p>

      <div class="mt-4 grid grid-cols-3 gap-2 text-center">
        <div class="bg-white/70 rounded-xl p-2">
          <p class="text-xs text-slate-500">生命线气色</p>
          <p id="energyValue" class="text-lg font-semibold">-</p>
        </div>
        <div class="bg-white/70 rounded-xl p-2">
          <p class="text-xs text-slate-500">智慧活跃度</p>
          <p id="wisdomValue" class="text-lg font-semibold">-</p>
        </div>
        <div class="bg-white/70 rounded-xl p-2">
          <p class="text-xs text-slate-500">情绪波动</p>
          <p id="emotionValue" class="text-lg font-semibold">-</p>
        </div>
      </div>

      <div class="mt-4 rounded-2xl border border-pink-100 bg-white/80 p-3">
        <label for="noteInput" class="text-xs text-pink-700">为这次记录留句话吧（可选）</label>
        <textarea id="noteInput" rows="3" class="mt-2 w-full rounded-xl border-pink-100 text-sm"
          placeholder="例如：今天状态比上周好多了，准备重启一个项目。"></textarea>
        <div class="mt-2 flex items-center gap-2">
          <button id="saveNoteButton" class="px-3 py-1.5 rounded-full bg-pink-600 text-white text-xs">保存便签</button>
          <span id="noteStatusText" class="text-xs text-slate-500"></span>
        </div>
      </div>

      <div class="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-2">
        <a href="../palm_calendar/code.html" class="flex-1 text-center py-2 rounded-full bg-pink-600 text-white">进入手相日历</a>
        <a id="monthlyLink" href="../monthly_energy/code.html" class="flex-1 text-center py-2 rounded-full bg-indigo-600 text-white hidden">查看月度月相图</a>
        <a href="../light_1/code.html" class="flex-1 text-center py-2 rounded-full border border-pink-200 text-pink-700">返回首页</a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const API_BASE = 'http://localhost:8080/api/v1';
      const USER_KEY = 'palmistry.userId';
      const CAPTURE_KEY = 'palmistry.capturedImage';
      const REPORT_CACHE_KEY = 'palmistry.weeklyRecord';

      const photoInput = document.getElementById('photoInput');
      const pickPhotoButton = document.getElementById('pickPhotoButton');
      const previewWrap = document.getElementById('previewWrap');
      const previewImage = document.getElementById('previewImage');
      const submitButton = document.getElementById('submitButton');
      const statusText = document.getElementById('statusText');
      const resultCard = document.getElementById('resultCard');
      const recordDateInput = document.getElementById('recordDateInput');

      const compareHint = document.getElementById('compareHint');
      const summaryText = document.getElementById('summaryText');
      const energyValue = document.getElementById('energyValue');
      const wisdomValue = document.getElementById('wisdomValue');
      const emotionValue = document.getElementById('emotionValue');
      const runeTag = document.getElementById('runeTag');
      const noteInput = document.getElementById('noteInput');
      const saveNoteButton = document.getElementById('saveNoteButton');
      const noteStatusText = document.getElementById('noteStatusText');
      const monthlyLink = document.getElementById('monthlyLink');

      let imageData = localStorage.getItem(CAPTURE_KEY) || '';
      let currentRecordId = null;

      const today = new Date();
      const minDate = new Date(today.getTime() - 6 * 24 * 60 * 60 * 1000);
      const toDateText = (d) => d.toISOString().slice(0, 10);
      recordDateInput.max = toDateText(today);
      recordDateInput.min = toDateText(minDate);
      recordDateInput.value = toDateText(today);

      if (!localStorage.getItem(USER_KEY)) {
        localStorage.setItem(USER_KEY, 'guest-demo');
      }

      if (imageData) {
        previewImage.src = imageData;
        previewWrap.classList.remove('hidden');
      }

      const renderResult = (payload) => {
        compareHint.textContent = payload.compareHint || '已生成本周对比';
        summaryText.textContent = payload.aiSummary || '';
        energyValue.textContent = payload.energyLevel ?? '-';
        wisdomValue.textContent = payload.wisdomActive ?? '-';
        emotionValue.textContent = payload.emotionWave ?? '-';

        const rune = payload.runeColor || 'blue';
        const map = {
          gold: ['金色符文', 'bg-amber-100 text-amber-700'],
          blue: ['蓝色符文', 'bg-blue-100 text-blue-700'],
          purple: ['紫色符文', 'bg-purple-100 text-purple-700']
        };
        const style = map[rune] || map.blue;
        runeTag.textContent = style[0];
        runeTag.className = 'text-xs px-2 py-1 rounded-full ' + style[1];
        currentRecordId = payload.recordId || null;
        noteInput.value = payload.userNote || '';
        monthlyLink.classList.toggle('hidden', !(payload.monthlyUnlocked === true));

        resultCard.classList.remove('hidden');
      };

      pickPhotoButton.addEventListener('click', () => photoInput.click());
      photoInput.addEventListener('change', () => {
        const file = photoInput.files && photoInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          imageData = String(reader.result || '');
          localStorage.setItem(CAPTURE_KEY, imageData);
          previewImage.src = imageData;
          previewWrap.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      });

      submitButton.addEventListener('click', async () => {
        if (!imageData) {
          statusText.textContent = '请先上传手掌照片';
          return;
        }

        submitButton.disabled = true;
        statusText.textContent = '正在写入本周能量档案...';

        try {
          const response = await fetch(API_BASE + '/record/weekly', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              userId: localStorage.getItem(USER_KEY),
              recordMode: 'quick',
              imageData,
              recordDate: recordDateInput.value
            })
          });

          if (!response.ok) {
            throw new Error('HTTP ' + response.status);
          }

          const payload = await response.json();
          localStorage.setItem(REPORT_CACHE_KEY, JSON.stringify(payload));
          statusText.textContent = '你的本周能量已存入赛博手相档案';
          renderResult(payload);
        } catch (error) {
          statusText.textContent = '记录失败，请稍后重试';
        } finally {
          submitButton.disabled = false;
        }
      });

      saveNoteButton.addEventListener('click', async () => {
        if (!currentRecordId) {
          noteStatusText.textContent = '请先完成一次记录';
          return;
        }
        saveNoteButton.disabled = true;
        noteStatusText.textContent = '保存中...';
        try {
          const response = await fetch(API_BASE + '/record/note', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              recordId: String(currentRecordId),
              userNote: String(noteInput.value || '').trim() || ' '
            })
          });
          if (!response.ok) {
            throw new Error('HTTP ' + response.status);
          }
          noteStatusText.textContent = '便签已保存';
        } catch (error) {
          noteStatusText.textContent = '保存失败，请稍后重试';
        } finally {
          saveNoteButton.disabled = false;
        }
      });

      try {
        const cache = localStorage.getItem(REPORT_CACHE_KEY);
        if (cache) {
          const payload = JSON.parse(cache);
          renderResult(payload);
        }
      } catch (e) {
        // Ignore cache parse errors.
      }
    })();
  </script>
</body>

</html>
