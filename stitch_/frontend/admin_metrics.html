<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手相研究所 · 指标看板</title>
  <style>
    :root {
      --bg: #fff8f7;
      --ink: #2b1d23;
      --muted: #735f68;
      --pink: #ec4899;
      --pink-2: #db2777;
      --lav: #e8dff8;
      --mint: #d8efe3;
      --card: rgba(255, 255, 255, 0.62);
      --line: rgba(255, 255, 255, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 8%, rgba(250, 218, 221, 0.72), transparent 38%),
        radial-gradient(circle at 94% 88%, rgba(225, 225, 245, 0.58), transparent 44%),
        var(--bg);
      padding: 24px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .hero,
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(236, 72, 153, 0.08);
    }

    .hero {
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      margin: 0;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }

    .btn.primary {
      color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--pink-2));
      box-shadow: 0 8px 16px rgba(236, 72, 153, 0.24);
    }

    .btn.ghost {
      color: #7a3f60;
      border: 1px solid #f2cbe0;
      background: #fff;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .card {
      padding: 14px;
    }

    .kpi-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 800;
    }

    .panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .meter {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid #f2dce8;
      border-radius: 16px;
      padding: 12px;
    }

    .meter-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .meter-title {
      font-weight: 700;
    }

    .meter-pct {
      color: #9a476f;
      font-weight: 700;
    }

    .bar {
      height: 10px;
      width: 100%;
      border-radius: 999px;
      background: #f7eaf2;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--pink), #f973b4);
      transition: width 0.35s ease;
      width: 0%;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      padding: 0 2px;
    }

    .ok {
      color: #2c7a53;
    }

    .err {
      color: #9f1239;
    }

    .split {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 12px;
    }

    @media (max-width: 860px) {
      .split {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <section class="hero">
      <div>
        <h1 class="title">赛博手相 · 实时指标看板</h1>
        <p class="sub">读取 <code>/api/v1/metrics/summary</code>，用于观察分享率、广告解锁率、私域转化等核心指标。</p>
      </div>
      <div class="actions">
        <button id="refreshBtn" class="btn primary">刷新数据</button>
        <a href="./index.html" class="btn ghost">返回演示入口</a>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <div class="kpi-label">Single Analyze</div>
        <div id="kpiSingle" class="kpi-value">-</div>
      </article>
      <article class="card">
        <div class="kpi-label">CP Analyze</div>
        <div id="kpiCp" class="kpi-value">-</div>
      </article>
      <article class="card"
        style="background: linear-gradient(160deg, rgba(255,255,255,0.65), rgba(250, 218, 221, 0.5));">
        <div class="kpi-label">Ad Unlock</div>
        <div id="kpiAd" class="kpi-value">-</div>
      </article>
      <article class="card"
        style="background: linear-gradient(160deg, rgba(255,255,255,0.65), rgba(227, 235, 255, 0.55));">
        <div class="kpi-label">Weekly Record</div>
        <div id="kpiWeekly" class="kpi-value">-</div>
      </article>
      <article class="card"
        style="background: linear-gradient(160deg, rgba(255,255,255,0.65), rgba(216, 239, 227, 0.55));">
        <div class="kpi-label">Rare Mark Query</div>
        <div id="kpiRare" class="kpi-value">-</div>
      </article>
    </section>

    <section class="split">
      <div class="card panel">
        <div class="meter">
          <div class="meter-head">
            <span class="meter-title">广告解锁率</span>
            <span class="meter-pct" id="rateAdText">-</span>
          </div>
          <div class="bar">
            <div id="rateAdBar" class="fill"></div>
          </div>
        </div>

        <div class="meter">
          <div class="meter-head">
            <span class="meter-title">CP 发起率</span>
            <span class="meter-pct" id="rateCpText">-</span>
          </div>
          <div class="bar">
            <div id="rateCpBar" class="fill"></div>
          </div>
        </div>

        <div class="meter">
          <div class="meter-head">
            <span class="meter-title">分享率</span>
            <span class="meter-pct" id="rateShareText">-</span>
          </div>
          <div class="bar">
            <div id="rateShareBar" class="fill"></div>
          </div>
        </div>

        <div class="meter">
          <div class="meter-head">
            <span class="meter-title">私域转化率</span>
            <span class="meter-pct" id="rateLeadText">-</span>
          </div>
          <div class="bar">
            <div id="rateLeadBar" class="fill"></div>
          </div>
        </div>
      </div>

      <aside class="card">
        <div class="kpi-label">Data Status</div>
        <p id="statusText" class="status">准备连接后端...</p>
        <p class="status">默认接口地址：<code>http://localhost:8080/api/v1/metrics/summary</code></p>
        <p class="status">如果后端端口变化，请修改页面脚本中的 <code>API_BASE</code>。</p>
      </aside>
    </section>
  </div>

  <script>
    (function () {
      const API_BASE = 'http://localhost:8080/api/v1';
      const refreshBtn = document.getElementById('refreshBtn');
      const statusText = document.getElementById('statusText');

      const $ = (id) => document.getElementById(id);

      const clampRate = (num) => {
        if (Number.isNaN(num)) return 0;
        return Math.max(0, Math.min(100, num));
      };

      const bindRate = (value, textId, barId) => {
        const rate = clampRate(Number(value || 0));
        $(textId).textContent = rate.toFixed(2) + '%';
        $(barId).style.width = rate + '%';
      };

      const render = (data) => {
        $('kpiSingle').textContent = data.totalSingleAnalyze ?? 0;
        $('kpiCp').textContent = data.totalCpAnalyze ?? 0;
        $('kpiAd').textContent = data.totalAdUnlock ?? 0;
        $('kpiWeekly').textContent = data.totalWeeklyRecord ?? 0;
        $('kpiRare').textContent = data.totalRareMarkQuery ?? 0;

        bindRate(data.adUnlockRate, 'rateAdText', 'rateAdBar');
        bindRate(data.cpInitiateRate, 'rateCpText', 'rateCpBar');
        bindRate(data.shareRate, 'rateShareText', 'rateShareBar');
        bindRate(data.privateLeadRate, 'rateLeadText', 'rateLeadBar');
      };

      const load = async () => {
        statusText.textContent = '正在拉取指标数据...';
        statusText.className = 'status';

        try {
          const response = await fetch(API_BASE + '/metrics/summary');
          if (!response.ok) {
            throw new Error('HTTP ' + response.status);
          }

          const data = await response.json();
          render(data);
          statusText.textContent = '已连接后端，数据刷新成功';
          statusText.className = 'status ok';
        } catch (error) {
          statusText.textContent = '连接失败：请确认 Spring Boot 已启动（dev/prod 任一环境）';
          statusText.className = 'status err';
        }
      };

      refreshBtn.addEventListener('click', load);
      load();
      setInterval(load, 15000);
    })();
  </script>
</body>

</html>
