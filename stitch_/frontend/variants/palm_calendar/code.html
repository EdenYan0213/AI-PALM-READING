<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手相日历</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <style>
    body {
      background:
        radial-gradient(circle at 0% 0%, rgba(255, 226, 235, 0.64), transparent 34%),
        radial-gradient(circle at 100% 100%, rgba(210, 232, 255, 0.5), transparent 40%),
        #fff8f7;
    }

    .glass {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
    }

    .day-cell {
      min-height: 76px;
    }
  </style>
</head>

<body class="text-slate-800 min-h-screen pb-24">
  <main class="max-w-3xl mx-auto px-5 py-6 space-y-5">
    <header class="glass rounded-3xl p-5">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-semibold text-pink-700">手相日历</h1>
        <a href="../weekly_quick/code.html" class="text-xs text-pink-600 underline">开始本周记录</a>
      </div>
      <p id="monthCountText" class="mt-2 text-sm text-slate-600">本月已记录 0/4 次</p>
    </header>

    <section class="glass rounded-3xl p-4">
      <div class="flex items-center justify-between mb-3">
        <button id="prevMonthButton" class="px-3 py-1 rounded-full bg-white text-pink-700 border border-pink-100">上月</button>
        <h2 id="monthTitle" class="font-semibold">2026-04</h2>
        <button id="nextMonthButton" class="px-3 py-1 rounded-full bg-white text-pink-700 border border-pink-100">下月</button>
      </div>

      <div class="grid grid-cols-7 gap-2 text-xs text-center text-slate-500 mb-2">
        <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
      </div>
      <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>

      <div class="mt-4 text-xs text-slate-500">
        <span class="inline-flex items-center mr-3"><i class="w-2 h-2 rounded-full bg-amber-400 inline-block mr-1"></i>精力充沛</span>
        <span class="inline-flex items-center mr-3"><i class="w-2 h-2 rounded-full bg-blue-400 inline-block mr-1"></i>平稳运行</span>
        <span class="inline-flex items-center"><i class="w-2 h-2 rounded-full bg-purple-400 inline-block mr-1"></i>略显透支</span>
      </div>
    </section>

    <section class="glass rounded-3xl p-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-pink-700">本月能量趋势</h3>
        <span id="unlockHint" class="text-xs text-slate-500">累计4次可解锁月度月相图</span>
      </div>
      <svg id="trendSvg" viewBox="0 0 320 120" class="w-full h-28 rounded-xl bg-white/70"></svg>
      <a id="monthlyReportButton" href="#" class="mt-3 block text-center py-2 rounded-full bg-indigo-500 text-white opacity-50 pointer-events-none">月度能量月相图（未解锁）</a>
    </section>
  </main>

  <script>
    (function () {
      const API_BASE = 'http://localhost:8080/api/v1';
      const USER_KEY = 'palmistry.userId';
      const calendarGrid = document.getElementById('calendarGrid');
      const monthTitle = document.getElementById('monthTitle');
      const monthCountText = document.getElementById('monthCountText');
      const trendSvg = document.getElementById('trendSvg');
      const unlockHint = document.getElementById('unlockHint');
      const monthlyReportButton = document.getElementById('monthlyReportButton');

      if (!localStorage.getItem(USER_KEY)) {
        localStorage.setItem(USER_KEY, 'guest-demo');
      }
      const userId = localStorage.getItem(USER_KEY);
      let monthCursor = new Date();

      const toYM = (d) => {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        return y + '-' + m;
      };

      const runeClass = (color) => {
        if (color === 'gold') return 'bg-amber-400';
        if (color === 'purple') return 'bg-purple-400';
        return 'bg-blue-400';
      };

      const drawTrend = (trend) => {
        trendSvg.innerHTML = '';
        if (!Array.isArray(trend) || trend.length === 0) {
          trendSvg.innerHTML = '<text x="20" y="64" fill="#64748b" font-size="12">本月暂无趋势数据，完成记录后这里会亮起来。</text>';
          return;
        }

        const points = trend.map((item, index) => {
          const x = 24 + (index * (272 / Math.max(1, trend.length - 1)));
          const y = 104 - (Math.max(1, Math.min(10, item.energyLevel)) - 1) * 10;
          return { x, y, date: item.date };
        });

        const path = points.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
        trendSvg.innerHTML += '<path d="' + path + '" fill="none" stroke="#ec4899" stroke-width="2.5" />';
        points.forEach((p) => {
          trendSvg.innerHTML += '<circle cx="' + p.x + '" cy="' + p.y + '" r="3" fill="#ec4899"></circle>';
        });
      };

      const renderCalendar = (monthKey, records) => {
        calendarGrid.innerHTML = '';
        const [year, month] = monthKey.split('-').map(Number);
        const firstDay = new Date(year, month - 1, 1);
        const days = new Date(year, month, 0).getDate();
        const weekdayOffset = (firstDay.getDay() + 6) % 7;

        const map = {};
        (records || []).forEach((record) => {
          map[record.date] = record;
        });

        for (let i = 0; i < weekdayOffset; i++) {
          const empty = document.createElement('div');
          empty.className = 'day-cell';
          calendarGrid.appendChild(empty);
        }

        for (let day = 1; day <= days; day++) {
          const date = monthKey + '-' + String(day).padStart(2, '0');
          const record = map[date];
          const cell = document.createElement('button');
          cell.className = 'day-cell rounded-xl border border-white/80 bg-white/70 p-2 text-left';
          cell.innerHTML = '<div class="text-xs text-slate-500">' + day + '</div>';
          if (record) {
            cell.innerHTML += '<div class="mt-2 flex items-center gap-1"><i class="w-2 h-2 rounded-full ' + runeClass(record.runeColor) + '"></i><span class="text-[10px] text-slate-600">已记录</span></div>';
            cell.addEventListener('click', () => {
              window.location.href = '../record_detail/code.html?userId=' + encodeURIComponent(userId) + '&date=' + encodeURIComponent(date);
            });
          } else {
            cell.addEventListener('click', () => {
              const today = new Date().toISOString().slice(0, 10);
              if (date === today) {
                window.location.href = '../weekly_quick/code.html';
              }
            });
          }
          calendarGrid.appendChild(cell);
        }
      };

      const load = async () => {
        const ym = toYM(monthCursor);
        monthTitle.textContent = ym;
        const response = await fetch(API_BASE + '/record/calendar?userId=' + encodeURIComponent(userId) + '&yearMonth=' + encodeURIComponent(ym));
        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }
        const payload = await response.json();
        monthCountText.textContent = '本月已记录 ' + (payload.monthRecordCount || 0) + '/' + (payload.monthTarget || 4) + ' 次';
        const unlocked = (payload.monthRecordCount || 0) >= 4;
        unlockHint.textContent = unlocked ? '已满足4次记录，月度月相图已解锁' : '累计4次可解锁月度月相图';
        monthlyReportButton.href = '../monthly_energy/code.html?userId=' + encodeURIComponent(userId) + '&yearMonth=' + encodeURIComponent(payload.yearMonth || ym);
        monthlyReportButton.textContent = unlocked ? '查看月度能量月相图' : '月度能量月相图（未解锁）';
        monthlyReportButton.className = unlocked
          ? 'mt-3 block text-center py-2 rounded-full bg-indigo-600 text-white'
          : 'mt-3 block text-center py-2 rounded-full bg-indigo-500 text-white opacity-50 pointer-events-none';
        renderCalendar(payload.yearMonth, payload.records || []);
        drawTrend(payload.trend || []);
      };

      document.getElementById('prevMonthButton').addEventListener('click', async () => {
        monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth() - 1, 1);
        await load();
      });
      document.getElementById('nextMonthButton').addEventListener('click', async () => {
        monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth() + 1, 1);
        await load();
      });

      load().catch(() => {
        monthCountText.textContent = '加载失败，请确认后端服务已启动';
      });
    })();
  </script>
</body>

</html>
