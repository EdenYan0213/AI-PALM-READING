<!DOCTYPE html>

<html class="light" lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-tertiary-container": "#5a675c",
            "on-primary-container": "#765e61",
            "on-secondary": "#ffffff",
            "on-primary-fixed": "#281719",
            "inverse-surface": "#333030",
            "primary-container": "#fadadd",
            "on-secondary-container": "#626374",
            "surface-variant": "#e8e1e1",
            "surface-container-highest": "#e8e1e1",
            "on-surface-variant": "#4f4445",
            "inverse-primary": "#debfc2",
            "surface": "#fff8f7",
            "surface-bright": "#fff8f7",
            "primary": "#70585b",
            "primary-fixed": "#fbdbde",
            "error": "#ba1a1a",
            "tertiary-fixed": "#d8e6d8",
            "on-surface": "#1d1b1b",
            "on-tertiary-fixed": "#121e15",
            "outline-variant": "#d2c3c4",
            "surface-dim": "#dfd8d8",
            "tertiary-container": "#d7e6d7",
            "surface-container-lowest": "#ffffff",
            "on-primary": "#ffffff",
            "secondary": "#5c5d6e",
            "surface-container-low": "#f9f2f2",
            "on-primary-fixed-variant": "#574144",
            "on-secondary-fixed-variant": "#444655",
            "on-tertiary-fixed-variant": "#3d4a3f",
            "surface-container": "#f3ecec",
            "inverse-on-surface": "#f6efef",
            "error-container": "#ffdad6",
            "on-background": "#1d1b1b",
            "on-tertiary": "#ffffff",
            "surface-container-high": "#ede7e6",
            "tertiary": "#546256",
            "outline": "#807475",
            "on-secondary-fixed": "#191b29",
            "secondary-fixed-dim": "#c5c5d8",
            "tertiary-fixed-dim": "#bccabc",
            "on-error-container": "#93000a",
            "surface-tint": "#70585b",
            "primary-fixed-dim": "#debfc2",
            "secondary-fixed": "#e1e1f5",
            "background": "#fff8f7",
            "secondary-container": "#e1e1f5",
            "on-error": "#ffffff"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "container-margin": "24px",
            "element-gap": "12px",
            "gutter": "16px",
            "section-gap": "40px",
            "unit": "8px"
          },
          "fontFamily": {
            "headline-md": ["Plus Jakarta Sans"],
            "headline-lg": ["Plus Jakarta Sans"],
            "body-lg": ["Plus Jakarta Sans"],
            "display-lg": ["Plus Jakarta Sans"],
            "body-md": ["Plus Jakarta Sans"],
            "label-md": ["Plus Jakarta Sans"]
          },
          "fontSize": {
            "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],
            "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "500" }],
            "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
            "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "300" }],
            "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
            "label-md": ["14px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600" }]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

    .palm-guide-path {
      stroke-dasharray: 10;
      animation: dash 20s linear infinite;
    }

    @keyframes dash {
      to {
        stroke-dashoffset: 1000;
      }
    }

    .camera-blur-bg {
      filter: blur(8px) brightness(1.1);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-background text-on-background font-body-md min-h-screen overflow-hidden flex flex-col">
  <!-- Top Navigation Bar (Shared Component Strategy) -->
  <header
    class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 py-2 bg-white/40 dark:bg-slate-900/40 backdrop-blur-xl rounded-full mt-4 mx-6 border border-white/60 dark:border-white/10 shadow-[0_0_15px_rgba(250,218,221,0.3)]">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-pink-500" data-icon="auto_awesome">auto_awesome</span>
      <span class="text-xl font-bold text-pink-500 italic tracking-tight font-headline-md">Palmistry AI</span>
    </div>
    <div class="flex items-center gap-4">
      <button class="p-2 text-pink-400 hover:opacity-80 transition-opacity active:scale-95 duration-300">
        <span class="material-symbols-outlined" data-icon="flash_on">flash_on</span>
      </button>
      <button class="p-2 text-pink-400 hover:opacity-80 transition-opacity active:scale-95 duration-300">
        <span class="material-symbols-outlined" data-icon="aspect_ratio">aspect_ratio</span>
      </button>
    </div>
  </header>
  <!-- Main Camera Viewport -->
  <main class="relative flex-grow w-full h-full flex flex-col items-center justify-center pt-24 pb-40">
    <!-- Simulated Camera Background -->
    <div class="absolute inset-0 z-0">
      <img alt="Camera Preview" class="w-full h-full object-cover camera-blur-bg"
        data-alt="Soft focused close-up of a human palm with warm, bright natural lighting and ethereal airy atmosphere"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgxR_gUvh7DP0jjHH0QbHK-fJN1qPoqAuIXQtfOOoREGLs8Raic7lNjan7e-VMzG6sugunHONoBv7EXWJpPg57AcH63_rffiWq-KHNMFGXtraQw_5KSpgnsVgkDcDBYl0UXwG3e6reKayawL-NOTgIdUYb9OZbDihA4ZzXq7Ky_7i5pg3eOeY8FXRSh48ChaLORdmlHmx-fCVBX9nechVtgSydl2FcDTTIXK6W-39Kr6JfY9E5WwK7a1MiAWSMtokjMpwJOVJk8w" />
      <div class="absolute inset-0 bg-white/10 backdrop-overlay"></div>
    </div>
    <input accept="image/*" capture="environment" class="hidden" id="photoInput" type="file" />
    <!-- Instruction Header -->
    <div
      class="relative z-10 mb-8 px-6 py-3 bg-white/40 backdrop-blur-md rounded-full border border-white/60 shadow-sm">
      <p class="text-primary font-headline-md text-label-md tracking-widest text-center">请将手掌对齐引导线</p>
      <p class="text-[11px] text-primary/70 text-center mt-1">光线充足更精准，建议男左女右</p>
    </div>
    <div
      class="relative z-10 mb-4 w-[280px] rounded-[28px] border border-white/70 bg-white/60 backdrop-blur-md overflow-hidden shadow-lg hidden"
      id="photoPreviewWrap">
      <img id="photoPreview" alt="Selected palm photo preview" class="w-full h-48 object-cover" />
      <div class="p-3 text-center text-sm text-primary/80">已选择照片，可继续分析</div>
    </div>
    <!-- Palm Guide Overlay -->
    <div class="relative z-10 w-full max-w-[320px] aspect-[3/4] flex items-center justify-center">
      <!-- White Outline Guide -->
      <svg class="w-full h-full drop-shadow-[0_0_15px_rgba(255,255,255,0.8)] opacity-80" fill="none"
        viewbox="0 0 200 250" xmlns="http://www.w3.org/2000/svg">
        <path class="palm-guide-path"
          d="M40 220C40 220 20 180 20 140C20 100 40 70 40 70M40 70C40 70 35 40 45 35C55 30 65 50 65 70M65 70C65 70 65 30 75 25C85 20 95 35 95 70M95 70C95 70 95 20 105 15C115 10 125 25 125 70M125 70C125 70 130 35 140 35C150 35 155 55 155 85C155 115 145 180 145 180M145 180C145 180 170 185 175 160M40 220C40 220 50 240 100 240C150 240 145 180 145 180"
          stroke="white" stroke-linecap="round" stroke-width="2.5"></path>
        <!-- Scanning Scanning Points -->
        <circle class="animate-pulse" cx="70" cy="120" fill="white" r="2"></circle>
        <circle class="animate-pulse" cx="100" cy="110" fill="white" r="2" style="animation-delay: 0.5s"></circle>
        <circle class="animate-pulse" cx="130" cy="130" fill="white" r="2" style="animation-delay: 1s"></circle>
      </svg>
    </div>
  </main>
  <!-- Bottom Controls Area -->
  <div class="fixed bottom-0 left-0 w-full z-50 px-8 pb-12 pt-6 flex flex-col items-center gap-8">
    <!-- Photo Actions -->
    <div class="w-full flex items-center justify-between max-w-sm">
      <!-- Album Entry -->
      <button
        class="w-12 h-12 rounded-xl bg-white/30 backdrop-blur-md border border-white/40 overflow-hidden flex items-center justify-center hover:bg-white/50 transition-all active:scale-90 p-0"
        id="pickAlbumButton" type="button">
        <img alt="Gallery" class="w-full h-full object-cover opacity-60"
          data-alt="Small thumbnail of a dreamy artistic portrait with soft lighting"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJfMSYNOAvN1U24qAbi_exYWRFmyCjkbeiI6BFvizgdnxLF-dUGqZNIOaF9w46x4KLfAg3ysI2dV_PlNoInjNfDvfzGCaQ3SfhkgfxXirfHacLDe-Duv0U44gLL5EyCGgDVpyKk115CbfSckTFAjyjOEk4ILPodY0opEHa5mgrWqWeX-U3-FHPMpv3xh3B_pb4iTalVApRXyFHi_16Wdq4UimHu13D_WI6Y8f6aYD_Aop32lUrar6XorBQzlR5PFt7bnBbFFHMw" />
      </button>
      <!-- Shutter Button -->
      <button class="relative group" id="startAnalyzeButton" type="button">
        <div class="absolute -inset-4 bg-pink-200/30 rounded-full blur-xl group-hover:bg-pink-300/40 transition-all">
        </div>
        <div
          class="relative w-20 h-20 rounded-full bg-white border-[6px] border-pink-100 p-1 flex items-center justify-center shadow-lg active:scale-90 transition-transform duration-300">
          <div class="w-full h-full rounded-full bg-gradient-to-tr from-pink-400 to-pink-300 shadow-inner"></div>
        </div>
      </button>
      <script>
          (function () {
            const photoInput = document.getElementById('photoInput');
            const pickAlbumButton = document.getElementById('pickAlbumButton');
            const startAnalyzeButton = document.getElementById('startAnalyzeButton');
            const photoPreviewWrap = document.getElementById('photoPreviewWrap');
            const photoPreview = document.getElementById('photoPreview');
            const captureKey = 'palmistry.capturedImage';
            const captureMetaKey = 'palmistry.capturedMeta';
            const reportCacheKey = 'palmistry.singleReport';
            const analyzeErrorKey = 'palmistry.analyzeError';
            const traceKey = 'palmistry.tracePayload';

            const openPicker = () => photoInput.click();

            pickAlbumButton.addEventListener('click', openPicker);
            startAnalyzeButton.addEventListener('click', openPicker);

            photoInput.addEventListener('change', async () => {
              const file = photoInput.files && photoInput.files[0];
              if (!file) {
                return;
              }

              const reader = new FileReader();
              reader.onload = () => {
                const dataUrl = reader.result;
                localStorage.setItem(captureKey, String(dataUrl));
                localStorage.setItem(captureMetaKey, JSON.stringify({ name: file.name, type: file.type, size: file.size }));
                localStorage.removeItem(reportCacheKey);
                localStorage.removeItem(analyzeErrorKey);
                localStorage.removeItem(traceKey);
                photoPreview.src = String(dataUrl);
                photoPreviewWrap.classList.remove('hidden');
                window.location.href = '../ai..._light/code.html?source=photo';
              };
              reader.readAsDataURL(file);
            });
          })();
      </script>
      <!-- Back/Switch Button -->
      <button
        class="w-12 h-12 rounded-full bg-white/30 backdrop-blur-md border border-white/40 flex items-center justify-center text-pink-500 hover:bg-white/50 transition-all active:scale-90">
        <span class="material-symbols-outlined" data-icon="cached">cached</span>
      </button>
    </div>
    <!-- Navigation Placeholder (Integrated Style) -->
    <nav
      class="w-full max-w-md bg-white/40 backdrop-blur-2xl rounded-full border border-white/40 shadow-[0_-8px_30px_rgba(250,218,221,0.2)] flex justify-around items-center px-4 py-3">
      <a class="flex flex-col items-center justify-center text-pink-300 hover:text-pink-400 transition-colors"
        href="../light_1/code.html">
        <span class="material-symbols-outlined text-[24px]" data-icon="temple_hindu">temple_hindu</span>
        <span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold">灵地</span>
      </a>
      <button
        class="flex flex-col items-center justify-center text-pink-600 drop-shadow-[0_0_8px_rgba(244,114,182,0.6)]">
        <span class="material-symbols-outlined text-[24px]" data-icon="pan_tool_alt" data-weight="fill"
          style="font-variation-settings: 'FILL' 1;">pan_tool_alt</span>
        <span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold">掌相</span>
      </button>
      <a class="flex flex-col items-center justify-center text-pink-300 hover:text-pink-400 transition-colors"
        href="../light_3/code.html">
        <span class="material-symbols-outlined text-[24px]" data-icon="auto_stories">auto_stories</span>
        <span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold">宿命</span>
      </a>
      <button class="flex flex-col items-center justify-center text-pink-300 hover:text-pink-400 transition-colors">
        <span class="material-symbols-outlined text-[24px]" data-icon="auto_fix_high">auto_fix_high</span>
        <span class="font-['Plus_Jakarta_Sans'] text-[10px] font-semibold">藏经</span>
      </button>
    </nav>
  </div>
  <!-- Decorative Elements -->
  <div class="fixed top-1/4 -left-20 w-64 h-64 bg-pink-100/20 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="fixed bottom-1/4 -right-20 w-80 h-80 bg-blue-50/20 rounded-full blur-[100px] pointer-events-none"></div>
</body>

</html>
