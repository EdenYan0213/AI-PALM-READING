<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palmistry AI - 报告</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <style>
    body {
      background: linear-gradient(180deg, #fff8f7, #fdecef);
    }

    .card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    .line-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
    }

    .section-divider {
      border-top: 1px dashed rgba(236, 72, 153, 0.2);
    }

    .tip-card {
      background: linear-gradient(135deg, rgba(252, 231, 243, 0.6), rgba(255, 255, 255, 0.4));
      border: 1px solid rgba(236, 72, 153, 0.15);
    }
  </style>
</head>

<body class="text-gray-800 min-h-screen pb-24">
  <header class="sticky top-0 z-10 px-5 py-4 bg-white/70 backdrop-blur border-b border-pink-100">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <h1 class="text-lg font-semibold text-pink-700">Palmistry AI 报告</h1>
      <span id="llmBadge" class="text-xs px-3 py-1 rounded-full bg-pink-100 text-pink-700">待确认</span>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-5 py-6 space-y-5">
    <section class="card rounded-2xl p-5 hidden" id="capturedPalmCard">
      <h3 class="font-semibold text-pink-700">本次分析手掌图</h3>
      <img id="capturedPalmPreview" class="mt-3 w-full h-48 object-cover rounded-xl border border-pink-100"
        alt="Captured palm preview" />
    </section>

    <section class="card rounded-2xl p-5">
      <div class="flex items-center justify-between">
        <h2 id="handTypeTitle" class="text-2xl font-bold text-pink-700">手型</h2>
        <span id="sessionText" class="text-xs text-gray-500"></span>
      </div>
      <div class="mt-3 flex flex-wrap gap-2">
        <span id="tag1" class="text-xs px-3 py-1 rounded-full bg-pink-100 text-pink-700">标签1</span>
        <span id="tag2" class="text-xs px-3 py-1 rounded-full bg-pink-100 text-pink-700">标签2</span>
        <span id="tag3" class="text-xs px-3 py-1 rounded-full bg-pink-100 text-pink-700">标签3</span>
      </div>
      <p id="traceStatusText" class="mt-2 text-xs px-3 py-2 rounded-xl bg-slate-100 text-slate-700">掌纹确认状态加载中...</p>
      <p id="unlockHintText" class="mt-3 text-sm text-gray-600">报告加载中...</p>
    </section>

    <section id="overallSummaryCard" class="card rounded-2xl p-5 hidden">
      <h3 class="font-semibold text-pink-700 text-base">综合解读</h3>
      <p id="overallSummaryText" class="mt-2 text-sm leading-7 text-gray-700"></p>
    </section>

    <section class="card rounded-2xl p-5 space-y-5" id="linesSection">
      <article id="heartLineArticle">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-pink-500 font-semibold">感情线</span>
          <span id="heartLineTags" class="line-badge bg-pink-50 text-pink-600"></span>
        </div>
        <p id="heartLineText" class="mt-1 text-sm leading-6">加载中...</p>
        <div id="heartLineDetail" class="mt-3 hidden">
          <p id="heartLineDetailText" class="text-sm leading-7 text-gray-700"></p>
          <div class="mt-3 flex gap-2 flex-wrap">
            <span id="heartLineAdvice" class="tip-card rounded-xl px-3 py-2 text-xs text-pink-800"></span>
            <span id="heartLineTime" class="tip-card rounded-xl px-3 py-2 text-xs text-emerald-800"></span>
          </div>
        </div>
      </article>
      <div class="section-divider"></div>
      <article id="wisdomLineArticle">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-blue-500 font-semibold">智慧线</span>
          <span id="wisdomLineTags" class="line-badge bg-blue-50 text-blue-600"></span>
        </div>
        <p id="wisdomLineText" class="mt-1 text-sm leading-6 text-gray-400">此部分为进阶解读，等待15秒后可解锁完整解析。</p>
        <div id="wisdomLineDetail" class="mt-3 hidden">
          <p id="wisdomLineDetailText" class="text-sm leading-7 text-gray-700"></p>
          <div class="mt-3 flex gap-2 flex-wrap">
            <span id="wisdomLineAdvice" class="tip-card rounded-xl px-3 py-2 text-xs text-blue-800"></span>
            <span id="wisdomLineTime" class="tip-card rounded-xl px-3 py-2 text-xs text-emerald-800"></span>
          </div>
        </div>
      </article>
      <div class="section-divider"></div>
      <article id="lifeLineArticle">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-emerald-500 font-semibold">生命线</span>
          <span id="lifeLineTags" class="line-badge bg-emerald-50 text-emerald-600"></span>
        </div>
        <p id="lifeLineText" class="mt-1 text-sm leading-6 text-gray-400">此部分为进阶解读，等待15秒后可解锁完整解析。</p>
        <div id="lifeLineDetail" class="mt-3 hidden">
          <p id="lifeLineDetailText" class="text-sm leading-7 text-gray-700"></p>
          <div class="mt-3 flex gap-2 flex-wrap">
            <span id="lifeLineAdvice" class="tip-card rounded-xl px-3 py-2 text-xs text-emerald-800"></span>
            <span id="lifeLineTime" class="tip-card rounded-xl px-3 py-2 text-xs text-amber-800"></span>
          </div>
        </div>
      </article>
    </section>

    <section class="card rounded-2xl p-5">
      <div class="flex items-center justify-between">
        <h3 class="font-semibold text-pink-700">稀有印记</h3>
        <button id="rareMarkButton" class="text-xs px-3 py-1 rounded-full bg-pink-100 text-pink-700">查询完整版</button>
      </div>
      <p id="rareMarkName" class="mt-2 text-lg font-semibold">-</p>
      <p id="rareMarkDesc" class="mt-1 text-sm text-gray-600">-</p>
      <p id="wechatText" class="mt-3 text-sm">企业微信: CyberPalm-Master</p>
      <p id="quotaText" class="text-xs text-gray-500">本日剩余查询名额: --</p>
    </section>

    <section id="tipsSection" class="space-y-3 hidden">
      <div class="card rounded-2xl p-4">
        <h4 class="text-sm font-semibold text-amber-700">职业建议</h4>
        <p id="careerTipText" class="mt-1 text-sm text-gray-700"></p>
      </div>
      <div class="card rounded-2xl p-4">
        <h4 class="text-sm font-semibold text-pink-700">感情建议</h4>
        <p id="loveTipText" class="mt-1 text-sm text-gray-700"></p>
      </div>
      <div class="card rounded-2xl p-4">
        <h4 class="text-sm font-semibold text-emerald-700">健康建议</h4>
        <p id="healthTipText" class="mt-1 text-sm text-gray-700"></p>
      </div>
      <div class="card rounded-2xl p-4">
        <h4 class="text-sm font-semibold text-purple-700">幸运时段</h4>
        <p id="luckyPeriodText" class="mt-1 text-sm text-gray-700"></p>
      </div>
    </section>

    <section class="space-y-3" id="deepSectionContainer"></section>

    <section>
      <button id="unlockDeepReportButton"
        class="w-full py-3 rounded-full bg-pink-600 text-white font-semibold">等待15秒解锁完整报告</button>
      <p id="adUnlockStatus" class="text-center text-xs text-gray-500 mt-2"></p>
      <a href="../weekly_quick/code.html"
        class="block w-full mt-3 py-3 rounded-full border border-pink-200 text-pink-700 text-center font-semibold">记录本周手相变化</a>
    </section>
  </main>

  <script>
    (function () {
      const API_BASE = 'http://localhost:8080/api/v1';
      const REPORT_CACHE_KEY = 'palmistry.singleReport';
      const ANALYZE_ERROR_KEY = 'palmistry.analyzeError';
      const CAPTURE_KEY = 'palmistry.capturedImage';

      const handTypeTitle = document.getElementById('handTypeTitle');
      const sessionText = document.getElementById('sessionText');
      const tag1 = document.getElementById('tag1');
      const tag2 = document.getElementById('tag2');
      const tag3 = document.getElementById('tag3');
      const heartLineText = document.getElementById('heartLineText');
      const wisdomLineText = document.getElementById('wisdomLineText');
      const lifeLineText = document.getElementById('lifeLineText');
      const heartLineTags = document.getElementById('heartLineTags');
      const wisdomLineTags = document.getElementById('wisdomLineTags');
      const lifeLineTags = document.getElementById('lifeLineTags');
      const heartLineDetail = document.getElementById('heartLineDetail');
      const wisdomLineDetail = document.getElementById('wisdomLineDetail');
      const lifeLineDetail = document.getElementById('lifeLineDetail');
      const heartLineDetailText = document.getElementById('heartLineDetailText');
      const wisdomLineDetailText = document.getElementById('wisdomLineDetailText');
      const lifeLineDetailText = document.getElementById('lifeLineDetailText');
      const heartLineAdvice = document.getElementById('heartLineAdvice');
      const heartLineTime = document.getElementById('heartLineTime');
      const wisdomLineAdvice = document.getElementById('wisdomLineAdvice');
      const wisdomLineTime = document.getElementById('wisdomLineTime');
      const lifeLineAdvice = document.getElementById('lifeLineAdvice');
      const lifeLineTime = document.getElementById('lifeLineTime');
      const rareMarkName = document.getElementById('rareMarkName');
      const rareMarkDesc = document.getElementById('rareMarkDesc');
      const wechatText = document.getElementById('wechatText');
      const quotaText = document.getElementById('quotaText');
      const llmBadge = document.getElementById('llmBadge');
      const traceStatusText = document.getElementById('traceStatusText');
      const unlockHintText = document.getElementById('unlockHintText');
      const unlockButton = document.getElementById('unlockDeepReportButton');
      const adUnlockStatus = document.getElementById('adUnlockStatus');
      const rareMarkButton = document.getElementById('rareMarkButton');
      const deepSectionContainer = document.getElementById('deepSectionContainer');
      const capturedPalmCard = document.getElementById('capturedPalmCard');
      const capturedPalmPreview = document.getElementById('capturedPalmPreview');
      const overallSummaryCard = document.getElementById('overallSummaryCard');
      const overallSummaryText = document.getElementById('overallSummaryText');
      const tipsSection = document.getElementById('tipsSection');
      const careerTipText = document.getElementById('careerTipText');
      const loveTipText = document.getElementById('loveTipText');
      const healthTipText = document.getElementById('healthTipText');
      const luckyPeriodText = document.getElementById('luckyPeriodText');

      let sessionId = null;
      let overview = [];
      let unlocked = false;

      const goBackToCapture = (message) => {
        unlockHintText.textContent = message;
        setTimeout(() => {
          window.location.href = '../light_2/code.html';
        }, 1000);
      };

      const showPreview = () => {
        if (overview.length < 1) {
          heartLineText.textContent = '暂无可显示内容';
          return;
        }
        heartLineText.textContent = overview[0]?.shortInterpretation || '暂无可显示内容';
        if (overview[0]?.tags) heartLineTags.textContent = overview[0].tags;
        if (!unlocked) {
          wisdomLineText.textContent = '此部分为进阶解读，等待15秒后可解锁完整解析。';
          lifeLineText.textContent = '此部分为进阶解读，等待15秒后可解锁完整解析。';
        }
      };

      const showFullOverview = () => {
        unlocked = true;
        if (overview.length >= 3) {
          wisdomLineText.textContent = overview[1]?.shortInterpretation || wisdomLineText.textContent;
          lifeLineText.textContent = overview[2]?.shortInterpretation || lifeLineText.textContent;
          wisdomLineTags.textContent = overview[1]?.tags || '';
          lifeLineTags.textContent = overview[2]?.tags || '';

          overview.forEach((line, idx) => {
            const detailEl = [heartLineDetail, wisdomLineDetail, lifeLineDetail][idx];
            const detailTextEl = [heartLineDetailText, wisdomLineDetailText, lifeLineDetailText][idx];
            const adviceEl = [heartLineAdvice, wisdomLineAdvice, lifeLineAdvice][idx];
            const timeEl = [heartLineTime, wisdomLineTime, lifeLineTime][idx];
            if (line?.detailInterpretation) {
              detailEl.classList.remove('hidden');
              detailTextEl.textContent = line.detailInterpretation;
            }
            if (line?.actionableAdvice) {
              adviceEl.textContent = line.actionableAdvice;
            }
            if (line?.timeWindow) {
              timeEl.textContent = line.timeWindow;
            }
          });
        }
      };

      const renderDeepSections = (sections) => {
        deepSectionContainer.innerHTML = '';
        if (!Array.isArray(sections) || sections.length === 0) {
          return;
        }
        sections.forEach((section) => {
          const card = document.createElement('div');
          card.className = 'card rounded-2xl p-5';
          card.innerHTML =
            '<h4 class="font-semibold text-pink-700">' + (section.title || '深度趋势') + '</h4>' +
            '<p class="mt-2 text-sm leading-6">' + (section.detail || '') + '</p>' +
            '<p class="mt-2 text-xs text-pink-700">赛博建议: ' + (section.cyberTip || '') + '</p>';
          deepSectionContainer.appendChild(card);
        });
      };

      const loadReport = () => {
        const capturedImage = localStorage.getItem(CAPTURE_KEY);
        if (capturedImage) {
          capturedPalmPreview.src = capturedImage;
          capturedPalmCard.classList.remove('hidden');
        }

        const analyzeError = localStorage.getItem(ANALYZE_ERROR_KEY);
        const raw = localStorage.getItem(REPORT_CACHE_KEY);
        if (!raw) {
          goBackToCapture(analyzeError ? '上次模型分析失败，请重新拍照后重试。' : '请先拍照并完成分析，再查看报告。');
          return;
        }

        try {
          const payload = JSON.parse(raw);
          if (!payload || !payload.sessionId) {
            goBackToCapture('分析结果无效，请重新拍照。');
            return;
          }

          sessionId = payload.sessionId;
          sessionText.textContent = payload.sessionId;
          handTypeTitle.textContent = payload.handType || '未知手型';

          if (Array.isArray(payload.personalityTags)) {
            tag1.textContent = payload.personalityTags[0] || tag1.textContent;
            tag2.textContent = payload.personalityTags[1] || tag2.textContent;
            tag3.textContent = payload.personalityTags[2] || tag3.textContent;
          }

          if (Array.isArray(payload.freeOverview)) {
            overview = payload.freeOverview;
          }
          showPreview();

          if (payload.overallSummary) {
            overallSummaryText.textContent = payload.overallSummary;
            overallSummaryCard.classList.remove('hidden');
          }

          if (payload.careerTip || payload.loveTip || payload.healthTip || payload.luckyPeriod) {
            if (payload.careerTip) careerTipText.textContent = payload.careerTip;
            if (payload.loveTip) loveTipText.textContent = payload.loveTip;
            if (payload.healthTip) healthTipText.textContent = payload.healthTip;
            if (payload.luckyPeriod) luckyPeriodText.textContent = payload.luckyPeriod;
            tipsSection.classList.remove('hidden');
          }

          if (payload.traceConfirmed === true) {
            const summary = payload.traceFeatureSummary || '已进行掌纹共同确认，报告依据你的描绘轨迹生成。';
            traceStatusText.textContent = summary;
            traceStatusText.className = 'mt-2 text-xs px-3 py-2 rounded-xl bg-emerald-100 text-emerald-800';
          } else {
            traceStatusText.textContent = '未经确认，仅供参考。你可返回重画掌纹以获得更个性化解读。';
            traceStatusText.className = 'mt-2 text-xs px-3 py-2 rounded-xl bg-amber-100 text-amber-800';
          }

          if (payload.rareMark) {
            rareMarkName.textContent = payload.rareMark;
            rareMarkDesc.textContent = payload.teaser || rareMarkDesc.textContent;
          }

          if (payload.llmUsed === true) {
            llmBadge.textContent = '模型实时生成';
            llmBadge.className = 'text-xs px-3 py-1 rounded-full bg-emerald-100 text-emerald-700';
            unlockHintText.textContent = '当前仅展示部分内容，点击按钮等待15秒后可解锁完整报告。';
          } else {
            const statusText = payload.llmStatus ? ('状态: ' + payload.llmStatus) : '状态: fallback';
            llmBadge.textContent = '模型通道波动';
            llmBadge.className = 'text-xs px-3 py-1 rounded-full bg-amber-100 text-amber-700';
            unlockHintText.textContent = '本次使用增强基础版报告，' + statusText + '。可重新拍照再试一次模型生成。';
          }
        } catch (e) {
          goBackToCapture('解析报告失败，请重新拍照。');
        }
      };

      unlockButton.addEventListener('click', async () => {
        if (!sessionId) {
          adUnlockStatus.textContent = '当前会话无效，请重新分析';
          return;
        }

        unlockButton.disabled = true;
        adUnlockStatus.textContent = '解锁计时中，请等待15秒...';

        try {
          await new Promise((resolve) => setTimeout(resolve, 15000));
          const response = await fetch(API_BASE + '/palm/unlock-deep', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId })
          });

          if (!response.ok) {
            throw new Error('unlock failed');
          }

          const payload = await response.json();
          showFullOverview();
          renderDeepSections(payload.sections);
          unlockButton.textContent = '已解锁完整报告';
          unlockButton.classList.add('opacity-70', 'cursor-not-allowed');
          adUnlockStatus.textContent = '解锁成功';
        } catch (e) {
          unlockButton.disabled = false;
          adUnlockStatus.textContent = '解锁失败，请稍后重试';
        }
      });

      rareMarkButton.addEventListener('click', async () => {
        if (!sessionId) {
          return;
        }
        try {
          const response = await fetch(API_BASE + '/palm/rare-mark', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId })
          });
          if (!response.ok) {
            return;
          }
          const payload = await response.json();
          rareMarkName.textContent = payload.markName || rareMarkName.textContent;
          wechatText.textContent = '企业微信: ' + (payload.wechatId || 'CyberPalm-Master');
          quotaText.textContent = '本日剩余查询名额: ' + (payload.remainQuota ?? '--') + ' 次';
        } catch (e) {
          // Keep existing data when query fails.
        }
      });

      loadReport();
    })();
  </script>
</body>

</html>
