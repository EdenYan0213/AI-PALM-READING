server:
  port: 8080
  max-http-request-header-size: 32KB
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    max-http-form-post-size: 10MB
    max-swallow-size: 10MB

spring:
  application:
    name: palmistry-backend
  profiles:
    default: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      add-mappings: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

llm:
  enabled: true
  base-url: https://api.siliconflow.cn/v1
  api-key: sk-aempgvopllpgbqzikljzdwmngiyrhsfrbdoiexcsirnwgxhj
  model: Pro/zai-org/GLM-4.7
  fallback-model: zai-org/GLM-4.5-Air
