      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .scanning-line {

      background: linear-gradient(90deg, transparent, #f472b6, transparent);

            "surface-dim": "#dfd8d8",
            "tertiary-container": "#d7e6d7",
            "surface-container-lowest": "#ffffff",
            "on-primary": "#ffffff",

            "surface-container-low": "#f9f2f2",
            "on-primary-fixed-variant": "#574144",
            "on-secondary-fixed-variant": "#444655",
            "on-tertiary-fixed-variant": "#3d4a3f",
            "surface-container": "#f3ecec",
            "inverse-on-surface": "#f6efef",

            "on-background": "#1d1b1b",
            "on-tertiary": "#ffffff",
            "surface-container-high": "#ede7e6",
            "tertiary": "#546256",
            "outline": "#807475",
            "on-secondary-fixed": "#191b29",
            "secondary-fixed-dim": "#c5c5d8",
            "tertiary-fixed-dim": "#bccabc",
            "on-error-container": "#93000a",
            "surface-tint": "#70585b",
            "primary-fixed-dim": "#debfc2",
            "secondary-fixed": "#e1e1f5",

          "fontFamily": {

  <style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface">
  <!-- Top Navigation Anchor -->
  <header
    class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 py-2 rounded-full mt-4 mx-6 border border-white/60 bg-white/40 backdrop-blur-xl shadow-[0_0_15px_rgba(250,218,221,0.3)]">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-pink-400" data-icon="auto_awesome">auto_awesome</span>
      <span class="font-['Plus_Jakarta_Sans'] text-xl font-bold text-pink-500 italic tracking-tight">Palmistry AI</span>
    </div>
    <div class="flex items-center">
      <span class="material-symbols-outlined text-pink-300/70" data-icon="account_circle">account_circle</span>
    </div>
  </header>
  <!-- Main Content Canvas -->
  <main class="relative h-screen flex flex-col items-center justify-center px-container-margin overflow-hidden">
    <!-- Background Ethereal Shapes -->
    <div class="absolute top-1/4 -left-20 w-80 h-80 bg-pink-200/30 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-purple-200/20 rounded-full blur-[100px]"></div>
    <!-- Scanning Interface Container -->
    <div class="relative w-full max-w-lg aspect-square flex flex-col items-center justify-center">
      <!-- Rotating Aura Rings -->
      <div class="absolute inset-0 border-[0.5px] border-pink-300/40 rounded-full scale-100 opacity-20"></div>
      <div class="absolute inset-10 border-[0.5px] border-pink-400/30 rounded-full scale-90 opacity-40"></div>
      <div class="absolute inset-20 border-[1.5px] border-dashed border-pink-200/60 rounded-full scale-95 opacity-30">
      </div>
      <!-- Central Hand Graphic (Scan Zone) -->
      <div
        class="relative w-72 h-72 glass-panel rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(250,218,221,0.5)] overflow-hidden">
        <img alt="Scanning hand"
          class="w-48 h-48 object-contain opacity-60 mix-blend-multiply filter sepia-[0.3] brightness-110"
          data-alt="Delicate close-up of a human palm with detailed lines, illuminated by soft pink and white studio lighting, minimalist ethereal aesthetic"
          id="scanPreviewImage"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuBIkKuul6wOnTdjfFDKOsxp4fKchzZVx7c_xInLlwQKOid3F39MpyVVYUc-iQefbHFPAu--Jyf-wSc2PcuuEa2GSiRLao7T9r9fBIUzfGob1aFsL9ieLDO_mA8HUhXueDV8-fA1tDK0o8fGvj0XBMNR9vl1ZSygQhSdOp59T-l4OkpPEvCePDXFHNGjRxBtl-A2CZmNBWCZSWU7xqlzO92BJoHT7IhOUMl47XoSNuK1vo9jZolyDFRSTx4DKizZOZ9LJP3btb3-cQ" />
        <!-- Scanning Line Overlay -->
        <div class="absolute top-1/4 left-0 w-full scanning-line"></div>
        <!-- Digital Markers -->
        <div class="absolute top-1/2 left-1/4 w-2 h-2 bg-pink-400 rounded-full shadow-[0_0_8px_#f472b6]"></div>
        <div class="absolute top-1/3 right-1/3 w-1.5 h-1.5 bg-pink-300 rounded-full shadow-[0_0_8px_#fbcfe8]"></div>
        <div
          class="absolute bottom-1/3 left-1/2 w-2.5 h-2.5 bg-pink-500 rounded-full shadow-[0_0_10px_#ec4899] opacity-70">
        </div>
      </div>
      <!-- Pulsing Halo -->
      <div class="absolute w-80 h-80 rounded-full border border-pink-100/50 animate-pulse"></div>
    </div>
    <!-- Analysis Progress Section -->
    <div class="mt-section-gap w-full max-w-sm flex flex-col items-center gap-element-gap relative z-10">
      <!-- Progress Info -->
      <div class="flex justify-between w-full px-2">
        <span class="font-label-md text-label-md text-pink-600">分析中...</span>
        <span class="font-label-md text-label-md text-pink-600" id="progressPercent">12%</span>
      </div>
      <!-- Progress Bar -->
      <div class="w-full h-1.5 bg-pink-100/50 rounded-full overflow-hidden border border-white/40">
        <div
          class="h-full bg-gradient-to-r from-pink-300 to-pink-500 rounded-full shadow-[0_0_10px_rgba(244,114,182,0.5)]"
          id="progressFill" style="width: 12%"></div>
      </div>
      <!-- Scrolling Status Texts -->
      <div class="h-16 w-full mt-4 overflow-hidden status-scroll-mask flex flex-col items-center">
        <div class="flex flex-col items-center gap-2 text-center">
          <p class="font-body-md text-body-md text-on-primary-container/80" id="statusPrev">正在扫描掌型编码...</p>
          <p class="font-headline-md text-headline-md text-pink-600" id="statusCurrent">正在破译感情线波段...</p>
          <p class="font-body-md text-body-md text-on-primary-container/40" id="statusNext">正在捕获稀有印记...</p>
        </div>
      </div>
    </div>
  </main>
  <!-- Bottom Navigation Anchor (Suppressed for focused analysis task as per guidelines) -->
  <!-- Navigation Shell hidden to prioritize content during transactional analysis process -->
  <!-- Mystic Decorative Corner -->
  <div class="fixed bottom-10 left-10 pointer-events-none opacity-20">
    <span class="material-symbols-outlined text-7xl text-pink-400" data-icon="auto_fix_high">auto_fix_high</span>
  </div>
  <div class="fixed top-24 right-10 pointer-events-none opacity-20">
    <span class="material-symbols-outlined text-6xl text-pink-400" data-icon="stars">stars</span>
  </div>
  <script>
      (function () {
        const CAPTURE_KEY = "palmistry.capturedImage";
        const steps = [
          "正在扫描掌型编码...",
          "正在破译感情线波段...",
          "正在交叉比对智慧线标签...",
          "正在捕获稀有印记...",
          "正在生成赛博解读文案..."
        ];

        const progressPercent = document.getElementById("progressPercent");
        const progressFill = document.getElementById("progressFill");
        const statusPrev = document.getElementById("statusPrev");
        const statusCurrent = document.getElementById("statusCurrent");
        const statusNext = document.getElementById("statusNext");
        const scanPreviewImage = document.getElementById("scanPreviewImage");

        let progress = 12;
        const imageData = localStorage.getItem(CAPTURE_KEY) || "";
        if (!imageData) {
          statusCurrent.textContent = "请先拍照或上传手掌照片";
          setTimeout(() => {
            window.location.href = "../light_2/code.html";
          }, 900);
          return;
        }

        scanPreviewImage.src = imageData;

        const paintStatus = () => {
          const index = Math.min(steps.length - 1, Math.floor((progress / 100) * steps.length));
          statusPrev.textContent = steps[Math.max(0, index - 1)];
          statusCurrent.textContent = steps[index];
          statusNext.textContent = steps[Math.min(steps.length - 1, index + 1)];
        };

        const tick = setInterval(() => {
          progress += Math.random() * 4 + 1.8;
          if (progress >= 100) {
            progress = 100;
          }

          const value = Math.round(progress);
          progressPercent.textContent = value + "%";
          progressFill.style.width = value + "%";
          paintStatus();

          if (value >= 100) {
            clearInterval(tick);
            setTimeout(() => {
              window.location.href = "../trace_confirm/code.html?from=analysis";
            }, 420);
          }
        }, 140);

        paintStatus();
      })();
  </script>
</body>

</html>
